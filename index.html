<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
  <head>
    <!-- =====================================
                META
    ====================================== -->

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="LifeOS - Productivity Dashboard" />

    <title>LifeOS Dashboard</title>

    <!-- =====================================
                GOOGLE FONT
    ====================================== -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- =====================================
                FONT AWESOME
    ====================================== -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- =====================================
                BASE CSS
    ====================================== -->

    <link rel="stylesheet" href="./css/base/reset.css" />

    <link rel="stylesheet" href="./css/base/variables.css" />

    <link rel="stylesheet" href="./css/base/design-tokens.css" />

    <link rel="stylesheet" href="./css/base/typography.css" />

    <!-- =====================================
                LAYOUT CSS
    ====================================== -->

    <link rel="stylesheet" href="./css/layout/layout.css" />

    <link rel="stylesheet" href="./css/layout/sidebar.css" />

    <link rel="stylesheet" href="./css/layout/navbar.css" />

    <!-- =====================================
                COMPONENTS
    ====================================== -->

    <link rel="stylesheet" href="./css/components/buttons.css" />

    <link rel="stylesheet" href="./css/components/cards.css" />

    <link rel="stylesheet" href="./css/components/forms.css" />

    <link rel="stylesheet" href="./css/components/modal.css" />

    <link rel="stylesheet" href="./css/components/toast.css" />

    <!-- =====================================
                PAGE CSS
    ====================================== -->

    <link rel="stylesheet" href="./css/pages/dashboard.css" />

    <!-- =====================================
                GLOBAL CSS
    ====================================== -->

    <link rel="stylesheet" href="./css/animations.css" />

    <link rel="stylesheet" href="./css/utilities.css" />

    <link rel="stylesheet" href="./css/responsive.css" />

    <link rel="stylesheet" href="./css/theme.css" />
  </head>

  <body>
    <!-- =====================================
                PAGE LOADER
    ====================================== -->

    <div id="page-loader">
      <div class="loader-spinner"></div>
    </div>

    <!-- =====================================
                APPLICATION
    ====================================== -->

    <div id="app">
      <!-- =================================
                    SIDEBAR
        ================================== -->

      <aside id="sidebar" class="expanded">
        <div class="sidebar-top">
          <div class="logo">
            <div class="logo-icon">
              <i class="fa-solid fa-layer-group"></i>
            </div>

            <span class="logo-text"> LifeOS </span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <ul>
            <li>
              <a href="#" class="active">
                <span class="nav-icon">
                  <i class="fa-solid fa-house"></i>
                </span>

                <span class="nav-label"> Dashboard </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-list-check"></i>
                </span>

                <span class="nav-label"> Tasks </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-fire"></i>
                </span>

                <span class="nav-label"> Habits </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-wallet"></i>
                </span>

                <span class="nav-label"> Finance </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-bullseye"></i>
                </span>

                <span class="nav-label"> Goals </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-calendar-days"></i>
                </span>

                <span class="nav-label"> Calendar </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-chart-line"></i>
                </span>

                <span class="nav-label"> Analytics </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-book"></i>
                </span>

                <span class="nav-label"> Journal </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-trophy"></i>
                </span>

                <span class="nav-label"> Achievements </span>
              </a>
            </li>

            <li>
              <a href="#">
                <span class="nav-icon">
                  <i class="fa-solid fa-gear"></i>
                </span>

                <span class="nav-label"> Settings </span>
              </a>
            </li>
          </ul>
        </nav>

        <div class="sidebar-footer">
          <button id="profile-button">
            <i class="fa-solid fa-user"></i>

            <span> Profile </span>
          </button>
        </div>
      </aside>

      <!-- =====================================
                    MAIN CONTENT
        ====================================== -->

      <main id="main-content">
        <!-- =================================
                        NAVBAR
            ================================== -->

        <header id="navbar">
          <div class="navbar-left">
            <button id="sidebar-toggle" class="icon-button">
              <i class="fa-solid fa-bars"></i>
            </button>

            <div class="navbar-title">
              <h1>Dashboard</h1>

              <p>Welcome back 👋</p>
            </div>
          </div>
          <div class="navbar-center">
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>

              <input type="text" placeholder="Search anything..." />
            </div>
          </div>

          <div class="navbar-right">
            <button id="theme-toggle" class="icon-button">
              <i class="fa-solid fa-moon"></i>
            </button>

            <button id="notification-button" class="icon-button">
              <i class="fa-regular fa-bell"></i>

              <span class="notification-badge"> 3 </span>
            </button>

            <button id="user-menu" class="user-button">
              <img
                src="./assets/images/avatars/default-avatar.png"
                alt="User Avatar"
              />

              <div class="user-info">
                <span class="user-name"> John Doe </span>

                <span class="user-role"> Productivity Master </span>
              </div>

              <i class="fa-solid fa-chevron-down"></i>
            </button>
          </div>
        </header>

        <!-- =================================
                        DASHBOARD
            ================================== -->

        <section id="dashboard">
          <div class="content-wrapper">
            <!-- Hero Section -->

            <section id="hero-section"></section>

            <!-- KPI Section -->

            <section id="kpi-grid"></section>

            <!-- Charts Section -->

            <section id="charts-section"></section>

            <!-- Dashboard Grid -->

            <section id="dashboard-grid" class="dashboard-grid"></section>
          </div>
        </section>
      </main>
    </div>

    <!-- =====================================
                MODALS
    ====================================== -->

    <div id="modal-root"></div>

    <!-- =====================================
                TOASTS
    ====================================== -->

    <div id="toast-root"></div>
    <!-- =====================================
                CHART.JS
    ====================================== -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- =====================================
                MAIN APP
    ====================================== -->

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
